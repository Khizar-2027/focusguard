<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusGuard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: 'Segoe UI', sans-serif;
      background: #1A1A2E;
      color: #ffffff;
    }
    .header {
      background: #16213E;
      padding: 16px 20px;
      border-bottom: 1px solid #0F3460;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 18px; color: #6C63FF; font-weight: 700; }
    .header span { font-size: 20px; }
    .body { padding: 16px 20px; }
    .card {
      background: #16213E;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9ca3af;
      margin-bottom: 8px;
    }
    .stat { font-size: 24px; font-weight: 700; }
    .stat.green { color: #22c55e; }
    .stat.red { color: #ef4444; }
    .stat.purple { color: #6C63FF; }
    .stat-label { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .input-group { margin-bottom: 10px; }
    .input-group label { font-size: 12px; color: #9ca3af; display: block; margin-bottom: 4px; }
    input {
      width: 100%;
      background: #0F3460;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 8px 12px;
      color: white;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #6C63FF; }
    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .btn-primary { background: #6C63FF; color: white; }
    .btn-danger { background: #dc2626; color: white; margin-top: 8px; }
    .btn-link {
      background: none;
      color: #6C63FF;
      font-size: 12px;
      text-decoration: underline;
      padding: 4px;
      width: auto;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-badge.active { background: #14532d; color: #4ade80; }
    .status-badge.inactive { background: #1c1917; color: #78716c; }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }
    .dot.green { background: #4ade80; }
    .dot.gray { background: #78716c; }
    #login-view, #main-view { display: none; }
    .warning {
      background: #7f1d1d;
      border: 1px solid #ef4444;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      color: #fca5a5;
      margin-bottom: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>🛡️</span>
    <h1>FocusGuard</h1>
  </div>

  <div class="body">
    <!-- Login View -->
    <div id="login-view">
      <div class="card">
        <div class="card-title">Sign in to sync data</div>
        <div class="input-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="your username" />
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>
        <div id="login-error" style="color:#ef4444;font-size:12px;margin-bottom:8px;display:none;"></div>
        <button class="btn-primary" id="login-btn">Sign In</button>
      </div>
    </div>

    <!-- Main View -->
    <div id="main-view">
      <div id="limit-warning" class="warning">
        🚨 You've exceeded your daily Reels limit!
      </div>

    <div class="card">
    <div class="card-title">Tracking Status</div>
    <div id="tracking-status" class="status-badge inactive">
        <div class="dot gray"></div> Not on distraction site
    </div>
    <div id="live-timer" style="font-size:14px;color:#6C63FF;margin-top:8px;font-weight:700;"></div>
    </div>

      <div class="grid">
        <div class="card">
          <div class="card-title">Reels Today</div>
          <div class="stat red" id="reels-today">0m</div>
          <div class="stat-label">auto-tracked</div>
        </div>
        <div class="card">
          <div class="card-title">Reels Limit</div>
          <div class="stat purple" id="reels-limit">60m</div>
          <div class="stat-label">per day</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Tracked Sites</div>
        <div style="font-size:12px;color:#9ca3af;line-height:1.8;">
          📱 Instagram Reels<br>
          ▶️ YouTube Shorts<br>
          🎵 TikTok<br>
          👤 Facebook Reels
        </div>
      </div>

      <button class="btn-primary" id="open-app-btn">Open FocusGuard App</button>
      <button class="btn-danger" id="logout-btn">Logout</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
